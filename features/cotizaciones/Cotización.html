/* ---------- helpers ---------- */
function hexToRgb(hex) {
  const h = hex.replace('#', '');
  const full = h.length === 3
    ? h.split('').map(c => c + c).join('')
    : h.padEnd(6, '0');
  return [parseInt(full.slice(0,2),16), parseInt(full.slice(2,4),16), parseInt(full.slice(4,6),16)];
}
function luminance(hex) {
  const [r,g,b] = hexToRgb(hex).map(v => {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}
function autoAccentInk(accent) {
  return luminance(accent) > 0.55 ? '#1a1f2e' : '#ffffff';
}
function darken(hex, amt = 0.3) {
  const [r,g,b] = hexToRgb(hex);
  const f = 1 - amt;
  const toHex = (v) => v.toString(16).padStart(2, '0');
  return '#' + toHex(Math.round(r * f)) + toHex(Math.round(g * f)) + toHex(Math.round(b * f));
}

          <div className="section">
            <div className="section-label">Imagen de fondo</div>
            <div className="bg-controls">
              <div className="top">
                <div className={`preview ${bgUrl ? '' : 'empty'}`}
                     style={bgUrl ? { backgroundImage: `url(${bgUrl})` } : {}}></div>
                <div className="actions">
                  <div className="bg-actions-row">
                    <button className="btn-soft" onClick={() => fileRef.current && fileRef.current.click()}>Subir</button>
                    {bgUrl && (
                      <button className="btn-soft danger" onClick={() => setBgUrl('')}>Quitar</button>
                    )}
                  </div>
                  <input ref={fileRef} type="file" accept="image/*"
                         style={{display: 'none'}} onChange={onUpload} />
                </div>
              </div>
              <input type="text"
                     className="url-input"
                     placeholder="o pega una URL: https://..."
                     value={bgUrl.startsWith('data:') ? '' : bgUrl}
                     onChange={e => setBgUrl(e.target.value)} />

              <div className="field" style={{marginTop: 12, marginBottom: 6}}>
                <label>Opacidad <span className="v">{Math.round(bgOpacity * 100)}%</span></label>
                <input type="range" min="0" max="1" step="0.01" className="range"
                       value={bgOpacity}
                       onChange={e => setBgOpacity(parseFloat(e.target.value))} />
              </div>

              <div className="field" style={{marginBottom: 0}}>
                <label>Modo de mezcla</label>
                <div className="row2" style={{gridTemplateColumns: 'repeat(3, 1fr)'}}>
                  {['normal', 'multiply', 'luminosity'].map(m => (
                    <button key={m}
                            className="btn-soft"
                            style={bgBlend === m ? {borderColor: '#f1ece1', color: '#f1ece1'} : {}}
                            onClick={() => setBgBlend(m)}>{m}</button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* PARAMS */}
          <div className="section">
            <div className="section-label">Parámetros</div>
            <div className="row2">
              <div className="field">
                <label>Moneda</label>
                <input className="input" value={currency} onChange={e => setCurrency(e.target.value)} maxLength={3} />
              </div>
              <div className="field">
                <label>Impuesto <span className="v">{taxRate}%</span></label>
                <input type="range" min="0" max="25" step="1" className="range"
                       value={taxRate} onChange={e => setTaxRate(parseInt(e.target.value, 10))} />
              </div>
            </div>
          </div>

          {/* NOTES */}
          <div className="section">
            <div className="section-label">Notas y términos</div>
            <textarea className="textarea" value={notes} onChange={e => setNotes(e.target.value)} />
          </div>

          <button className="print-btn" onClick={() => window.print()}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="6 9 6 2 18 2 18 9"></polyline>
              <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
              <rect x="6" y="14" width="12" height="8"></rect>
            </svg>
            Imprimir / PDF
          </button>

          <div style={{
            marginTop: 22, paddingTop: 18,
            borderTop: '1px solid rgba(255,255,255,.06)',
            fontFamily: 'JetBrains Mono, monospace',
            fontSize: 10.5, color: '#6a6055', letterSpacing: '0.04em', lineHeight: 1.6
          }}>
            Tamaño Carta · 8.5 × 11 in<br/>
            {LAYOUTS.find(l => l.id === layoutId).name.toLowerCase()} · {presetId}
          </div>
        </div>
      </aside>

      {/* ============== CANVAS ============== */}
      <main className="canvas">
        <div className="page">
          {bgUrl && (
            <div className="bg-image" style={{
              backgroundImage: `url(${bgUrl})`,
              opacity: bgOpacity,
              mixBlendMode: bgBlend,
            }} />
          )}
          <div className="page-inner">
            <Layout
              company={COMPANY}
              client={CLIENT}
              items={ITEMS}
              payment={PAYMENT}
              notes={notes}
              currency={currency}
              taxRate={taxRate}
              subtotal={subtotal}
              tax={tax}
              total={total}
            />
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
