<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cerrajero Pro Express — UI Kit · Móvil</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      font-family: var(--font-sans);
      color: var(--fg);
      background: var(--bg);
      background-image: var(--texture-dots);
      background-size: var(--texture-dots-size);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center;
      padding: 28px 20px;
      gap: 18px;
      min-height: 100%;
    }
    .label {
      font: 600 11px/1 var(--font-sans);
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--primary);
      display: flex; align-items: center; gap: 8px;
    }
    .label .dot {
      width: 6px; height: 6px; border-radius: 99px; background: var(--primary);
      box-shadow: 0 0 8px var(--primary);
    }
    h1 {
      margin: 0;
      font: 800 clamp(1.5rem, 4vw, 2rem)/1.05 var(--font-sans);
      letter-spacing: -0.03em;
      color: var(--fg);
      text-align: center;
    }
    h1 .accent { color: var(--primary); }
    p.sub {
      margin: 0 0 12px;
      font: 500 13px/1.5 var(--font-sans);
      color: var(--fg-muted);
      max-width: 520px; text-align: center;
    }

    /* iPhone-shaped frame */
    .phone {
      width: 402px;
      height: 814px;
      border-radius: 56px;
      background: #0A0A0F;
      box-shadow:
        0 50px 100px hsl(240 16% 6% / 0.25),
        0 0 0 1px hsl(240 16% 6% / 0.18),
        inset 0 0 0 2px hsl(0 0% 100% / 0.04);
      padding: 12px;
      position: relative;
      flex-shrink: 0;
    }
    .phone::before {
      /* Dynamic island */
      content: '';
      position: absolute;
      top: 22px; left: 50%; transform: translateX(-50%);
      width: 126px; height: 37px;
      border-radius: 24px;
      background: #000;
      z-index: 10;
    }
    .phone::after {
      /* Home indicator */
      content: '';
      position: absolute;
      bottom: 22px; left: 50%; transform: translateX(-50%);
      width: 139px; height: 5px;
      border-radius: 100px;
      background: hsl(0 0% 100% / 0.7);
      z-index: 10;
      pointer-events: none;
    }
    .screen {
      width: 100%; height: 100%;
      border-radius: 44px;
      overflow: hidden;
      background: var(--bg);
      position: relative;
    }
    .screen iframe {
      width: 100%; height: 100%;
      border: 0; display: block;
    }

    .nav {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center;
    }
    .nav-btn {
      padding: 9px 16px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--fg);
      font: 600 12px/1 var(--font-sans);
      cursor: pointer;
      transition: all 150ms var(--ease-out);
    }
    .nav-btn:hover { border-color: var(--primary); color: var(--primary); }
    .nav-btn.active {
      background: var(--primary);
      color: var(--primary-fg);
      border-color: transparent;
      box-shadow: 0 0 16px hsl(159 100% 45% / 0.30);
    }
  </style>
</head>
<body>
  <div class="label"><span class="dot"></span> Vista móvil · 402 × 814</div>
  <h1>Cerrajería <span class="accent">Express</span></h1>
  <p class="sub">Salta entre pantallas para ver cómo la navegación inferior, el FAB contextual y las sheets se sienten en una mano.</p>

  <div class="nav" id="nav">
    <button class="nav-btn active" data-screen="dashboard">Dashboard</button>
    <button class="nav-btn" data-screen="inventario">Inventario</button>
    <button class="nav-btn" data-screen="servicios">Servicios</button>
    <button class="nav-btn" data-screen="more">Menú "Más"</button>
    <button class="nav-btn" data-screen="profile">Perfil</button>
    <button class="nav-btn" data-screen="notif">Notif.</button>
    <button class="nav-btn" data-screen="fab-product">Nuevo prod.</button>
    <button class="nav-btn" data-screen="auth">Login</button>
  </div>

  <div class="phone">
    <div class="screen">
      <iframe id="frame" src="index.html" title="App móvil"></iframe>
    </div>
  </div>

  <script>
    const frame = document.getElementById('frame');
    const buttons = document.querySelectorAll('.nav-btn');

    // The inner app reads `window.location.hash` on boot.
    // We reload with a hash so we don't have to expose imperative APIs.
    function navigate(screen) {
      buttons.forEach(b => b.classList.toggle('active', b.dataset.screen === screen));
      frame.src = 'index.html#' + screen;
    }

    buttons.forEach(b => b.addEventListener('click', () => navigate(b.dataset.screen)));
  </script>
</body>
</html>
