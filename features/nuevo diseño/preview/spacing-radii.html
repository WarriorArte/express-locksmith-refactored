<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; padding:0; background:var(--card); color:var(--fg); }
  body { font-family: var(--font-sans); padding: 22px 24px; }
  .row { display:flex; gap: 20px; align-items: flex-end; }
  .item { text-align:center; }
  .box { width: 92px; height: 92px; background: var(--surface-2); border:1px solid var(--border); }
  .name { margin-top: 8px; font: 600 11px/1.2 var(--font-sans); color:var(--fg); }
  .px { font: 500 10px/1.4 var(--font-sans); color:var(--fg-muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius)"></div><div class="name">--radius</div><div class="px">0.4rem · 6.4px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="name">--radius-lg</div><div class="px">16px · hero only</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="name">--radius-xl</div><div class="px">20px · FAB only</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:140px;height:38px"></div><div class="name">--radius-pill</div><div class="px">9999px · badges</div></div>
  </div>
</body>
</html>
