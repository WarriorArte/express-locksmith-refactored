<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; padding:0; }
  body { font-family: var(--font-sans); padding: 18px; display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel { border-radius: var(--radius); padding: 22px; height: 132px; position:relative; overflow:hidden; }
  .light { background: #F7F8FA; background-image: radial-gradient(circle, hsl(240 16% 6% / 0.08) 1px, transparent 1px); background-size: 22px 22px; color: var(--fg); border: 1px solid var(--border); }
  .dark  { background: linear-gradient(135deg, #131318 0%, #1E1E26 100%), radial-gradient(circle, hsl(0 0% 100% / 0.06) 1px, transparent 1px); background-size: auto, 22px 22px; color: #F0F0F8; border: 1px solid hsl(0 0% 100% / 0.06); }
  .dark .panel-content { position:relative; z-index:1; }
  .label { font: 600 10px/1 var(--font-sans); letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.6; }
  .title { font: 800 22px/1.05 var(--font-sans); letter-spacing: -0.02em; margin-top: 6px; }
  .meta { font: 500 11px/1.4 var(--font-sans); opacity: 0.7; margin-top: 8px; }
</style>
</head>
<body>
  <div class="panel light">
    <div class="label">ground plane · light</div>
    <div class="title">Surface Pale + Dots</div>
    <div class="meta">22×22 grid · fg @ 8% opacity</div>
  </div>
  <div class="panel dark">
    <div class="label">hero surface</div>
    <div class="title">Sidebar Void + Dots</div>
    <div class="meta">gradient-hero · fg @ 6% opacity</div>
  </div>
</body>
</html>
