<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; padding:0; background:var(--card); color:var(--fg); }
  body { font-family: var(--font-sans); padding: 22px 24px; }
  .grid { display:grid; grid-template-columns: 60px 1fr; row-gap: 6px; column-gap: 18px; align-items:baseline; }
  .w { font: 500 11px/1 var(--font-sans); color: var(--fg-muted); font-variant-numeric: tabular-nums; }
  .sample { font-family: var(--font-sans); font-size: 22px; letter-spacing: -0.01em; color: var(--fg); }
</style>
</head>
<body>
  <div class="grid">
    <div class="w">400</div><div class="sample" style="font-weight:400">Cerrajería Express 0123456789</div>
    <div class="w">500</div><div class="sample" style="font-weight:500">Cerrajería Express 0123456789</div>
    <div class="w">600</div><div class="sample" style="font-weight:600">Cerrajería Express 0123456789</div>
    <div class="w">700</div><div class="sample" style="font-weight:700">Cerrajería Express 0123456789</div>
    <div class="w">800</div><div class="sample" style="font-weight:800">Cerrajería Express 0123456789</div>
  </div>
</body>
</html>
