<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cerrajería Express — Rediseño v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;font-family:'DM Sans',system-ui,sans-serif;}
::-webkit-scrollbar{width:0;height:0;}

/* ── LIGHT THEME ── */
:root{
  --bg:#F5F6FA; --surface:#FFFFFF; --surface2:#F0F1F6; --surface3:#E8EAF0;
  --border:rgba(0,0,0,0.07); --border2:rgba(0,0,0,0.12);
  --fg1:#0D0D14; --fg2:#52526E; --fg3:#9898B0;
  --p:#00E5A0; --p-dim:#00C98C; --p-glow:rgba(0,229,160,0.2); --p-text:#0A0A0F;
  --sheet:#FFFFFF; --nav:#FFFFFF; --nav-border:rgba(0,0,0,0.07);
  --err:#FF4D6A; --warn:#FFB830; --info:#4D9FFF;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}
/* ── DARK THEME ── */
.dark{
  --bg:#0A0A10; --surface:#13131A; --surface2:#1C1C26; --surface3:#242432;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --fg1:#EDEDF8; --fg2:#7070A0; --fg3:#3C3C58;
  --sheet:#181820; --nav:#101018; --nav-border:rgba(255,255,255,0.06);
}

body{background:var(--bg);color:var(--fg1);}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative;background:var(--bg);overflow:hidden;}
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ── TOPBAR ── */
.topbar{padding:52px 20px 14px;flex-shrink:0;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;}

/* ── BOTTOM NAV ── */
.bnav{display:flex;align-items:center;justify-content:space-around;height:68px;padding:0 8px 4px;flex-shrink:0;background:var(--nav);border-top:1px solid var(--nav-border);safe-area-inset-bottom:env(safe-area-inset-bottom);}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;color:var(--fg3);padding:6px 0;border-radius:12px;transition:color .15s;}
.bnav-btn.active{color:var(--p);}
.fab-btn{width:50px;height:50px;border-radius:16px;background:var(--p);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 24px var(--p-glow),0 4px 16px rgba(0,229,160,.3);margin-bottom:10px;flex-shrink:0;transition:transform .15s;}
.fab-btn:active{transform:scale(.95);}

/* ── CARDS ── */
.card{background:var(--surface);border-radius:20px;border:1px solid var(--border);box-shadow:var(--shadow);}
.card-p{padding:16px;}

/* ── INPUTS ── */
.inp{width:100%;padding:13px 14px;border-radius:13px;border:1.5px solid var(--border2);background:var(--surface2);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--fg1);outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--p);}
.inp-icon{padding-left:40px;}
.inp-wrap{position:relative;}
.inp-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);display:flex;align-items:center;color:var(--fg3);}
label.lbl{font-size:11px;font-weight:700;color:var(--fg3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px;}

/* ── BUTTONS ── */
.btn{font-family:'DM Sans',sans-serif;border:none;border-radius:13px;cursor:pointer;font-weight:700;transition:transform .15s,filter .15s;}
.btn:active{transform:scale(.97);}
.btn-p{background:var(--p);color:var(--p-text);padding:14px 20px;font-size:14px;width:100%;box-shadow:0 0 20px var(--p-glow);}
.btn-p:hover{filter:brightness(.93);}
.btn-ghost{background:var(--surface2);color:var(--fg2);padding:12px 16px;font-size:13px;border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface3);}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:10px;}
.btn-icon{width:36px;height:36px;border-radius:11px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.btn-danger{background:rgba(255,77,106,.12);color:var(--err);padding:12px 16px;font-size:13px;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:9999px;font-size:11px;font-weight:700;}
.b-green{background:rgba(0,229,160,.12);color:#00C98C;}
.b-yellow{background:rgba(255,184,48,.12);color:#E09A00;}
.b-red{background:rgba(255,77,106,.12);color:var(--err);}
.b-blue{background:rgba(77,159,255,.12);color:var(--info);}
.b-gray{background:var(--surface2);color:var(--fg3);}
.b-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
.tab{flex:1;padding:11px 6px;font-size:11px;font-weight:600;color:var(--fg3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'DM Sans',sans-serif;min-width:56px;}
.tab.active{color:var(--p);border-bottom-color:var(--p);}

/* ── SHEET ── */
.sheet-overlay{position:absolute;inset:0;z-index:80;display:flex;flex-direction:column;justify-content:flex-end;}
.sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);}
.sheet-box{position:relative;z-index:1;background:var(--sheet);border-radius:24px 24px 0 0;padding:12px 20px 32px;max-height:92%;display:flex;flex-direction:column;animation:sheetUp .3s cubic-bezier(.4,0,.2,1);}
.sheet-scroll{overflow-y:auto;flex:1;}
.handle{width:36px;height:4px;border-radius:2px;background:var(--fg3);margin:0 auto 18px;opacity:.4;}
@keyframes sheetUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── LIST ITEMS ── */
.list-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.list-item:last-child{border-bottom:none;}
.list-item:active{background:var(--surface2);}
.icon-box{border-radius:13px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── SECTION TITLE ── */
.sec-title{font-size:11px;font-weight:700;color:var(--fg3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}

/* ── VIEW TOGGLE ── */
.view-toggle{display:flex;background:var(--surface2);border-radius:10px;padding:3px;gap:2px;}
.vt-btn{padding:6px 10px;border-radius:7px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;color:var(--fg3);transition:background .15s,color .15s;}
.vt-btn.active{background:var(--surface);color:var(--fg1);box-shadow:var(--shadow);}

/* ── STAT CARD ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-card{border-radius:18px;padding:15px;}
.stat-card.primary{background:var(--p);box-shadow:0 0 28px var(--p-glow);}
.stat-card.dark{background:var(--surface);}

/* ── CHIP FILTERS ── */
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;}
.chip{padding:7px 13px;border-radius:9999px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;transition:background .15s,color .15s,box-shadow .15s;}
.chip.active{background:var(--p);color:var(--p-text);box-shadow:0 0 14px var(--p-glow);}
.chip.inactive{background:var(--surface);color:var(--fg2);border:1px solid var(--border);}

/* ── PRODUCT CARD (GRID) ── */
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.prod-card{background:var(--surface);border-radius:18px;overflow:hidden;border:1px solid var(--border);}
.prod-img{height:120px;background:var(--surface2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.prod-img img{width:100%;height:100%;object-fit:cover;}

/* ── FORM SECTIONS ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-field{margin-bottom:14px;}
.form-field:last-child{margin-bottom:0;}

/* ── TOGGLE SWITCH ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);}
.toggle{width:42px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--p);}
.toggle.off{background:var(--surface3);}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.on::after{left:21px;}
.toggle.off::after{left:3px;}

/* ── SUMMARY BOX ── */
.summary-box{background:var(--surface2);border-radius:16px;padding:14px 16px;}
.sum-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:3px 0;}
.sum-total{display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:800;padding-top:10px;margin-top:6px;border-top:1px solid var(--border);}

/* ── IMAGE GRID ── */
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.img-thumb{aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--surface2);position:relative;}
.img-thumb img{width:100%;height:100%;object-fit:cover;}

/* ── GUARANTEE CARD ── */
.warranty-card{background:var(--surface);border-radius:18px;padding:14px 16px;border:1px solid var(--border);border-left:3px solid var(--p);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─────────────────────────────────────────────────
// ICON HELPER
// ─────────────────────────────────────────────────
function Ic({n,s=18,c,style={}}) {
  const ref = React.useRef(null);
  React.useLayoutEffect(() => {
    if (!ref.current) return;
    ref.current.innerHTML = '';
    const el = document.createElement('i');
    el.setAttribute('data-lucide', n);
    ref.current.appendChild(el);
    lucide.createIcons({nodes:[el]});
    const svg = ref.current.querySelector('svg');
    if (svg) { svg.style.width=s+'px'; svg.style.height=s+'px'; if(c) svg.style.color=c; }
  });
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',...style}}/>;
}

// ─────────────────────────────────────────────────
// BOTTOM SHEET
// ─────────────────────────────────────────────────
function Sheet({open,onClose,title,children,height='auto'}) {
  if (!open) return null;
  return (
    <div className="sheet-overlay">
      <div className="sheet-bg" onClick={onClose}/>
      <div className="sheet-box" style={{maxHeight:height==='full'?'92%':height}}>
        <div className="handle"/>
        {title && (
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexShrink:0}}>
            <span style={{fontSize:17,fontWeight:800,color:'var(--fg1)'}}>{title}</span>
            <button onClick={onClose} className="btn-icon"><Ic n="x" s={15} c="var(--fg2)"/></button>
          </div>
        )}
        <div className="sheet-scroll">{children}</div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────
// STATUS CONFIG
// ─────────────────────────────────────────────────
const SVC_STATUS = {
  pending:     {label:'Pendiente',  cls:'b-yellow', dot:'#E09A00'},
  in_progress: {label:'En Curso',   cls:'b-blue',   dot:'var(--info)'},
  completed:   {label:'Finalizado', cls:'b-green',  dot:'var(--p)'},
  delivered:   {label:'Entregado',  cls:'b-gray',   dot:'var(--fg3)'},
  cancelled:   {label:'Cancelado',  cls:'b-red',    dot:'var(--err)'},
};
const SVC_TYPE = {
  automotive:  {label:'Automotriz', icon:'car'},
  residential: {label:'Residencial',icon:'home'},
  commercial:  {label:'Comercial',  icon:'building-2'},
  industrial:  {label:'Industrial', icon:'factory'},
};

// ─────────────────────────────────────────────────
// TOGGLE
// ─────────────────────────────────────────────────
function Toggle({on,onChange,label,sub,danger}) {
  return (
    <div className="toggle-row" style={danger?{borderColor:'rgba(255,77,106,.25)'}:{}}>
      <div>
        <div style={{fontSize:13,fontWeight:600,color:danger?'var(--err)':'var(--fg1)'}}>{label}</div>
        {sub && <div style={{fontSize:11,color:'var(--fg3)',marginTop:1}}>{sub}</div>}
      </div>
      <button className={`toggle ${on?'on':'off'}`} onClick={()=>onChange(!on)}/>
    </div>
  );
}

// ─────────────────────────────────────────────────
// SCREEN: AUTH
// ─────────────────────────────────────────────────
function AuthScreen({onLogin}) {
  const [f,setF] = React.useState({code:'',email:'',pw:''});
  const [loading,setLoading] = React.useState(false);
  const set = k => e => setF(p=>({...p,[k]:e.target.value}));
  const go = e => { e.preventDefault(); setLoading(true); setTimeout(()=>{setLoading(false);onLogin();},900); };
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',background:'var(--bg)',overflow:'auto',padding:'60px 24px 32px'}}>
      <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center'}}>
        <div style={{width:60,height:60,borderRadius:18,background:'var(--p)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 32px var(--p-glow)',marginBottom:16}}>
          <Ic n="key" s={28} c="var(--p-text)"/>
        </div>
        <h1 style={{fontSize:30,fontWeight:800,color:'var(--fg1)',letterSpacing:'-.03em',lineHeight:1.15,marginBottom:4}}>Cerrajería<br/><span style={{color:'var(--p)'}}>Express</span></h1>
        <p style={{fontSize:14,color:'var(--fg2)',marginBottom:32}}>Gestión inteligente de tu taller</p>
        <form onSubmit={go} style={{display:'flex',flexDirection:'column',gap:11}}>
          <div className="inp-wrap"><div className="inp-ico"><Ic n="building-2" s={16}/></div><input className="inp inp-icon" placeholder="Código del taller" value={f.code} onChange={e=>setF(p=>({...p,code:e.target.value.toUpperCase()}))} autoComplete="off"/></div>
          <div className="inp-wrap"><div className="inp-ico"><Ic n="mail" s={16}/></div><input className="inp inp-icon" type="email" placeholder="Correo electrónico" value={f.email} onChange={set('email')}/></div>
          <div className="inp-wrap"><div className="inp-ico"><Ic n="lock" s={16}/></div><input className="inp inp-icon" type="password" placeholder="Contraseña" value={f.pw} onChange={set('pw')}/></div>
          <div style={{marginTop:6}}><button type="submit" className="btn btn-p" disabled={loading}>{loading?'Iniciando...':'Iniciar sesión'}</button></div>
        </form>
        <p style={{textAlign:'center',fontSize:11,color:'var(--fg3)',marginTop:20}}>Contacta al administrador para obtener acceso</p>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────
// SCREEN: DASHBOARD
// ─────────────────────────────────────────────────
const ACTIVITY_DATA = [
  {icon:'shopping-cart',title:'Venta #0042',desc:'Cliente mostrador · $1,200',time:'5m',status:'completed'},
  {icon:'wrench',title:'Servicio #0019',desc:'Duplicado Ford Focus',time:'22m',status:'in_progress'},
  {icon:'file-text',title:'Cotización #0088',desc:'Empresa ABC · $8,500',time:'1h',status:null},
  {icon:'users',title:'Nuevo cliente',desc:'Ferretería López',time:'2h',status:null},
];

function DashboardScreen({onNav}) {
  const [sheet,setSheet] = React.useState(false);
  const [activeItem,setActiveItem] = React.useState(null);
  return (
    <div className="screen">
      <div className="scroll">
        {/* Header */}
        <div style={{padding:'52px 20px 8px',background:'var(--bg)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
            <div>
              <p style={{fontSize:13,color:'var(--fg2)',fontWeight:500}}>Bienvenido 👋</p>
              <h2 style={{fontSize:26,fontWeight:800,color:'var(--fg1)',letterSpacing:'-.025em'}}>Juan Álvarez</h2>
            </div>
            <div style={{position:'relative'}}>
              <div style={{width:42,height:42,borderRadius:14,background:'var(--p)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:15,color:'var(--p-text)',cursor:'pointer'}}>JA</div>
              <span style={{position:'absolute',top:2,right:2,width:9,height:9,borderRadius:'50%',background:'var(--err)',border:'2px solid var(--bg)'}}/>
            </div>
          </div>
        </div>

        <div style={{padding:'0 20px 100px',display:'flex',flexDirection:'column',gap:20}}>
          {/* Stats */}
          <div className="stat-grid">
            <div className="stat-card primary">
              <div style={{width:32,height:32,borderRadius:10,background:'rgba(10,10,15,.15)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:10}}><Ic n="shopping-cart" s={15} c="var(--p-text)"/></div>
              <div style={{fontSize:24,fontWeight:800,color:'var(--p-text)',letterSpacing:'-.02em',lineHeight:1.1}}>$42,500</div>
              <div style={{fontSize:11,fontWeight:600,color:'rgba(10,10,15,.65)',marginTop:3}}>Ventas del mes</div>
              <div style={{fontSize:10,color:'rgba(10,10,15,.45)',marginTop:1}}>18 transacciones</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {[
                {icon:'wrench',val:'7',lbl:'Servicios hoy',sub:'3 en curso'},
                {icon:'file-text',val:'24',lbl:'Cotizaciones',sub:'75% aceptadas'},
              ].map(s=>(
                <div key={s.lbl} className="stat-card dark card" style={{padding:'11px 13px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                    <div>
                      <div style={{fontSize:20,fontWeight:800,color:'var(--fg1)',letterSpacing:'-.02em'}}>{s.val}</div>
                      <div style={{fontSize:10,fontWeight:600,color:'var(--fg3)',marginTop:1}}>{s.lbl}</div>
                    </div>
                    <div style={{width:28,height:28,borderRadius:8,background:'rgba(0,229,160,.1)',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n={s.icon} s={13} c="var(--p)"/></div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Status bar */}
          <div className="card card-p">
            <div className="sec-title">Estado de servicios</div>
            <div style={{display:'flex',borderRadius:8,overflow:'hidden',height:8,marginBottom:10}}>
              {[{c:'var(--info)',w:20},{c:'var(--warn)',w:35},{c:'var(--p)',w:30},{c:'var(--fg3)',w:15}].map((b,i)=>(
                <div key={i} style={{flex:b.w,background:b.c}}/>
              ))}
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
              {[
                {l:'Pendientes',n:4,c:'var(--info)'},{l:'En Curso',n:7,c:'var(--warn)'},
                {l:'Completados',n:12,c:'var(--p)'},{l:'Entregados',n:9,c:'var(--fg3)'},
              ].map(s=>(
                <div key={s.l} style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{width:7,height:7,borderRadius:'50%',background:s.c,flexShrink:0}}/>
                  <span style={{fontSize:11,color:'var(--fg2)'}}>{s.l}</span>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--fg1)'}}>{s.n}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Quick actions */}
          <div>
            <div className="sec-title">Acciones rápidas</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
              {[
                {icon:'wrench',lbl:'Servicio',page:'servicios'},{icon:'shopping-cart',lbl:'Venta',page:'ventas'},
                {icon:'file-text',lbl:'Cotización',page:'cotizaciones'},{icon:'users',lbl:'Cliente',page:'clientes'},
              ].map(a=>(
                <button key={a.lbl} onClick={()=>onNav(a.page)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:7,padding:'12px 6px',borderRadius:14,border:'1px solid var(--border)',background:'var(--surface)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>
                  <div style={{width:36,height:36,borderRadius:11,background:'rgba(0,229,160,.1)',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n={a.icon} s={17} c="var(--p)"/></div>

function ClientDetail({client,onEdit}) {
  const activeTags = Object.entries(client.tags).filter(([,v])=>v).map(([k])=>k);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        <div style={{width:60,height:60,borderRadius:18,background:client.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:800,color:client.color,flexShrink:0}}>{client.initials}</div>
        <div>
          <div style={{fontSize:18,fontWeight:800,color:'var(--fg1)'}}>{client.name}</div>
          <div style={{fontSize:12,color:'var(--fg2)',marginTop:2}}>{client.type==='company'?'Empresa':'Persona'} · {client.services} servicios</div>
          {activeTags.length>0 && <div style={{display:'flex',gap:5,marginTop:5,flexWrap:'wrap'}}>{activeTags.map(t=><span key={t} className={`badge ${TAG_CONFIG[t]?.cls}`} style={{fontSize:9}}>{TAG_CONFIG[t]?.l}</span>)}</div>}
        </div>
      </div>

      {(client.phone||client.email||client.address) && (
        <div className="card" style={{overflow:'hidden'}}>
          {client.phone && <div style={{display:'flex',alignItems:'center',gap:10,padding:'11px 14px',borderBottom:'1px solid var(--border)'}}><Ic n="phone" s={15} c="var(--p)"/><span style={{fontSize:13,color:'var(--fg1)'}}>{client.phone}</span></div>}
          {client.email && <div style={{display:'flex',alignItems:'center',gap:10,padding:'11px 14px',borderBottom:client.address?'1px solid var(--border)':'none'}}><Ic n="mail" s={15} c="var(--p)"/><span style={{fontSize:13,color:'var(--fg1)'}}>{client.email}</span></div>}
          {client.address && <div style={{display:'flex',alignItems:'center',gap:10,padding:'11px 14px'}}><Ic n="map-pin" s={15} c="var(--p)"/><span style={{fontSize:13,color:'var(--fg1)'}}>{client.address}</span></div>}
        </div>
      )}

      {client.tags.no_work_again && (
        <div style={{background:'rgba(255,77,106,.08)',borderRadius:14,padding:'11px 13px',border:'1px solid rgba(255,77,106,.2)',display:'flex',gap:9,alignItems:'flex-start'}}>
          <Ic n="alert-triangle" s={16} c="var(--err)"/>
          <div><div style={{fontSize:12,fontWeight:700,color:'var(--err)'}}>No trabajar con este cliente</div><div style={{fontSize:11,color:'var(--err)',opacity:.7,marginTop:2}}>Ver historial para más detalles</div></div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>

        <button className="btn btn-p" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:5}}><Ic n="wrench" s={14}/>Nuevo servicio</button>
      </div>
    </div>
  );
}

function ClientForm({client,onClose}) {
  const [tags,setTags] = React.useState(client?.tags||{is_vip:false,is_frequent:false,has_debt:false,no_work_again:false});
  const [noWork,setNoWork] = React.useState(client?.tags?.no_work_again||false);
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:12,paddingTop:4}}>
        <div><label className="lbl">Nombre *</label><input className="inp" placeholder="Nombre completo o razón social" defaultValue={client?.name||''}/></div>
        <div className="form-row">
          <div><label className="lbl">Tipo</label><select className="inp" style={{cursor:'pointer'}} defaultValue={client?.type||'person'}><option value="person">Persona</option><option value="company">Empresa</option></select></div>
          <div><label className="lbl">Teléfono principal</label><input className="inp" placeholder="+52 55..." defaultValue={client?.phone||''}/></div>
        </div>
        <div className="form-row">
          <div><label className="lbl">Teléfono secundario</label><input className="inp" placeholder="+52 55..."/></div>
          <div><label className="lbl">Correo electrónico</label><input className="inp" type="email" placeholder="correo@..." defaultValue={client?.email||''}/></div>
        </div>
        <div><label className="lbl">Dirección</label><input className="inp" placeholder="Calle, número, colonia, ciudad" defaultValue={client?.address||''}/></div>

        {/* Tags */}
        <div>
          <div className="sec-title">Etiquetas</div>
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            <Toggle on={tags.is_vip} onChange={v=>setTags(p=>({...p,is_vip:v}))} label="Cerrajero externo / VIP" sub="Precio especial de mayoreo"/>
            <Toggle on={tags.is_frequent} onChange={v=>setTags(p=>({...p,is_frequent:v}))} label="Cliente frecuente"/>
            <Toggle on={tags.has_debt} onChange={v=>setTags(p=>({...p,has_debt:v}))} label="Tiene deuda pendiente" danger/>
            <Toggle on={noWork} onChange={v=>{setNoWork(v);setTags(p=>({...p,no_work_again:v}))}} label="No trabajar con este cliente" sub="Queda marcado como bloqueado" danger/>
          </div>
        </div>
        {noWork && <div><label className="lbl">Razón (No trabajar)</label><textarea className="inp" rows={2} placeholder="Explica por qué no se debe trabajar con este cliente..." style={{resize:'none',lineHeight:1.5}}/></div>}
        <div><label className="lbl">Notas</label><textarea className="inp" rows={2} placeholder="Notas adicionales sobre el cliente..." style={{resize:'none',lineHeight:1.5}}/></div>
      </div>
      <div style={{padding:'14px 4px 0',borderTop:'1px solid var(--border)',flexShrink:0,display:'flex',gap:8,marginTop:14}}>
        <button className="btn btn-ghost" onClick={onClose} style={{flex:1}}>Cancelar</button>
        <button className="btn btn-p" style={{flex:2}}>{client?'Guardar Cambios':'Crear Cliente'}</button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────
// ROOT APP
// ─────────────────────────────────────────────────
function App() {
  const [authPage,setAuthPage] = React.useState(true);
  const [page,setPage] = React.useState('dashboard');
  const [darkMode,setDarkMode] = React.useState(false);

  React.useEffect(()=>{
    document.documentElement.className = darkMode?'dark':'';
  },[darkMode]);

  if (authPage) return (
    <div className="app">
      <AuthScreen onLogin={()=>setAuthPage(false)}/>
    </div>
  );

  const handleNav = p => {
    if(p==='new') return; // FAB — context-sensitive in production
    setPage(p);
  };

  return (
    <div className="app">
      {page==='dashboard'    && <DashboardScreen onNav={setPage}/>}
      {page==='servicios'    && <ServiciosScreen/>}
      {page==='inventario'   && <InventarioScreen/>}
      {page==='cotizaciones' && <CotizacionesScreen/>}
      {page==='ventas'       && <VentasScreen/>}
      {page==='clientes'     && <ClientesScreen/>}
      {page==='mas'          && <MasScreen onNav={setPage} darkMode={darkMode} setDarkMode={setDarkMode}/>}
      <BottomNav page={page} onNav={handleNav}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
